name: SAST Security Scans

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write   # Required to upload SARIF to GitHub Security tab

env:
  GO_VERSION: "1.24"
  REPORT_DIR: /tmp/sast-reports

jobs:
  # ─── Job 1: Secret Scanning (Gitleaks) ───────────────────────────
  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history so Gitleaks can scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}   # Only needed for org-level scanning; omit for public repos

      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: gitleaks

  # ─── Job 2: Static Code Analysis (Semgrep) ───────────────────────
  semgrep:
    name: Code Scan (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create report directory
        run: mkdir -p ${{ env.REPORT_DIR }}

      - name: Run Semgrep — custom rules
        run: |
          semgrep \
            --config=.semgrep.yml \
            --config=p/golang \
            --config=p/owasp-top-ten \
            --severity=ERROR \
            --sarif \
            --output=${{ env.REPORT_DIR }}/semgrep-report.sarif \
            --error \
            .
        continue-on-error: false

      - name: Upload Semgrep SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.REPORT_DIR }}/semgrep-report.sarif
          category: semgrep

      - name: Upload Semgrep report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: ${{ env.REPORT_DIR }}/semgrep-report.sarif
          retention-days: 90

  # ─── Job 3: Dependency Vulnerability Scan (govulncheck) ──────────
  govulncheck:
    name: Dependency Scan (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Create report directory
        run: mkdir -p ${{ env.REPORT_DIR }}

      - name: Run govulncheck
        run: |
          govulncheck -json ./... \
            > ${{ env.REPORT_DIR }}/govulncheck-report.json
          # Also run in human-readable mode for the log
          govulncheck ./...
        # Continue even if vulnerabilities are found
        continue-on-error: true

      - name: Upload govulncheck report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: govulncheck-report
          path: ${{ env.REPORT_DIR }}/govulncheck-report.json
          retention-days: 90

  # ─── Job 4: Container / Filesystem Scan (Trivy) ──────────────────
  trivy:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary (for filesystem scan)
        run: go build -o gcp-security-analyzer .

      - name: Create report directory
        run: mkdir -p ${{ env.REPORT_DIR }}

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: ${{ env.REPORT_DIR }}/trivy-report.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: false
        # Continue even if vulnerabilities are found
        continue-on-error: true

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.REPORT_DIR }}/trivy-report.sarif
          category: trivy

      - name: Upload Trivy report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: ${{ env.REPORT_DIR }}/trivy-report.sarif
          retention-days: 90

  # ─── Job 5: Generate Report & Notify ──────────────────────
  report-and-notify:
    name: Generate Report & Notify
    runs-on: ubuntu-latest
    needs: [gitleaks, semgrep, govulncheck, trivy]
    # Run this job even when scans fail so reports are always generated
    if: always()
    steps:
      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/sast-reports
        # Continue even if some or all artifacts are missing
        continue-on-error: true

      - name: Generate consolidated SAST report
        id: report
        env:
          GITLEAKS_RESULT: ${{ needs.gitleaks.result }}
          SEMGREP_RESULT: ${{ needs.semgrep.result }}
          GOVULN_RESULT: ${{ needs.govulncheck.result }}
          TRIVY_RESULT: ${{ needs.trivy.result }}
        run: |
          #!/bin/bash
          set -euo pipefail

          # Ensure artifacts directory exists, even if empty
          ARTIFACTS_DIR="/tmp/sast-reports"
          mkdir -p "$ARTIFACTS_DIR"
          
          REPORT_MD_FILE="sast-summary.md"
          REPORT_HTML_FILE="sast-summary.html"
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          COMMIT_SHA="${GITHUB_SHA:0:7}"

          # Helper function to count findings in a SARIF file
          count_sarif_findings() {
            local file="$1"
            if [ ! -f "$file" ]; then
              echo "0"
              return
            fi
            jq '[.runs[].results[] | select(.level != "note")] | length' "$file" 2>/dev/null || echo "0"
          }

          # Helper function to extract and format SARIF findings for Markdown
          extract_sarif_findings_md() {
            local file="$1"
            
            if [ ! -f "$file" ]; then
              echo "  *(No findings file found - scan may not have completed)*"
              return
            fi
            
            local count=$(jq '[.runs[].results[] | select(.level != "note")] | length' "$file" 2>/dev/null || echo "0")
            
            if [ "$count" -eq 0 ]; then
              echo "  ✅ No findings detected"
            else
              echo "  Found $count issue(s):"
              jq -r '.runs[].results[] | select(.level != "note") | 
                "  - **\(.ruleId // \"unknown\")** [\(.level // \"info\")] — \(.message.text // \"No description\")" |
                head -10' "$file" 2>/dev/null || echo "  *(Unable to parse results)*"
              if [ "$count" -gt 10 ]; then
                echo "  ... and $((count - 10)) more findings (see full report for details)"
              fi
            fi
          }

          # Helper function to extract and format SARIF findings for HTML
          extract_sarif_findings_html() {
            local file="$1"
            
            if [ ! -f "$file" ]; then
              echo "    <p><em>No findings file found - scan may not have completed</em></p>"
              return
            fi
            
            local count=$(jq '[.runs[].results[] | select(.level != "note")] | length' "$file" 2>/dev/null || echo "0")
            
            if [ "$count" -eq 0 ]; then
              echo "    <p>✅ No findings detected</p>"
            else
              echo "    <p>Found $count issue(s):</p>"
              echo "    <ul>"
              jq -r '.runs[].results[] | select(.level != "note") | 
                "<li><strong>\(.ruleId // \"unknown\")</strong> [\(.level // \"info\")] — \(.message.text // \"No description\")</li>" |
                head -10' "$file" 2>/dev/null || echo "      <li><em>Unable to parse results</em></li>"
              if [ "$count" -gt 10 ]; then
                echo "      <li>... and $((count - 10)) more findings (see full report for details)</li>"
              fi
              echo "    </ul>"
            fi
          }

          # Process scan results
          # Gitleaks
          if [ -d "$ARTIFACTS_DIR/gitleaks-report" ] && [ -f "$ARTIFACTS_DIR/gitleaks-report/results.sarif" ]; then
            GITLEAKS_COUNT=$(count_sarif_findings "$ARTIFACTS_DIR/gitleaks-report/results.sarif")
            GITLEAKS_EMOJI=$([ "$GITLEAKS_COUNT" -eq 0 ] && echo "✅" || echo "⚠️")
          else
            GITLEAKS_COUNT="N/A"
            GITLEAKS_EMOJI="⚪"
          fi

          # Semgrep
          if [ -d "$ARTIFACTS_DIR/semgrep-report" ] && [ -f "$ARTIFACTS_DIR/semgrep-report/semgrep-report.sarif" ]; then
            SEMGREP_COUNT=$(count_sarif_findings "$ARTIFACTS_DIR/semgrep-report/semgrep-report.sarif")
            SEMGREP_EMOJI=$([ "$SEMGREP_COUNT" -eq 0 ] && echo "✅" || echo "⚠️")
          else
            SEMGREP_COUNT="N/A"
            SEMGREP_EMOJI="⚪"
          fi

          # govulncheck
          if [ -d "$ARTIFACTS_DIR/govulncheck-report" ] && [ -f "$ARTIFACTS_DIR/govulncheck-report/govulncheck-report.json" ]; then
            GOVULN_COUNT=$(jq '[.Vulns[]? // empty] | length' "$ARTIFACTS_DIR/govulncheck-report/govulncheck-report.json" 2>/dev/null || echo 0)
            GOVULN_EMOJI=$([ "$GOVULN_COUNT" -eq 0 ] && echo "✅" || echo "⚠️")
          else
            GOVULN_COUNT="N/A"
            GOVULN_EMOJI="⚪"
          fi

          # Trivy
          if [ -d "$ARTIFACTS_DIR/trivy-report" ] && [ -f "$ARTIFACTS_DIR/trivy-report/trivy-report.sarif" ]; then
            TRIVY_COUNT=$(count_sarif_findings "$ARTIFACTS_DIR/trivy-report/trivy-report.sarif")
            TRIVY_EMOJI=$([ "$TRIVY_COUNT" -eq 0 ] && echo "✅" || echo "⚠️")
          else
            TRIVY_COUNT="N/A"
            TRIVY_EMOJI="⚪"
          fi

          # Generate Markdown report
          echo "# SAST Security Scan Report" > "$REPORT_MD_FILE"
          echo "" >> "$REPORT_MD_FILE"
          echo "## Summary Table" >> "$REPORT_MD_FILE"
          echo "" >> "$REPORT_MD_FILE"
          echo "| Tool | Status | Findings |" >> "$REPORT_MD_FILE"
          echo "|------|--------|----------|" >> "$REPORT_MD_FILE"

          echo "| Gitleaks (Secrets) | $GITLEAKS_EMOJI $GITLEAKS_RESULT | $GITLEAKS_COUNT |" >> "$REPORT_MD_FILE"
          echo "| Semgrep (Code) | $SEMGREP_EMOJI $SEMGREP_RESULT | $SEMGREP_COUNT |" >> "$REPORT_MD_FILE"
          echo "| govulncheck (Deps) | $GOVULN_EMOJI $GOVULN_RESULT | $GOVULN_COUNT |" >> "$REPORT_MD_FILE"
          echo "| Trivy (Filesystem) | $TRIVY_EMOJI $TRIVY_RESULT | $TRIVY_COUNT |" >> "$REPORT_MD_FILE"

          echo "" >> "$REPORT_MD_FILE"
          echo "---" >> "$REPORT_MD_FILE"
          echo "" >> "$REPORT_MD_FILE"
          echo "## Detailed Findings" >> "$REPORT_MD_FILE"
          echo "" >> "$REPORT_MD_FILE"
          echo "### 🔐 Gitleaks (Secret Scanning)" >> "$REPORT_MD_FILE"

          extract_sarif_findings_md "$ARTIFACTS_DIR/gitleaks-report/results.sarif" >> "$REPORT_MD_FILE"

          echo "" >> "$REPORT_MD_FILE"
          echo "### 🔍 Semgrep (Static Code Analysis)" >> "$REPORT_MD_FILE"

          extract_sarif_findings_md "$ARTIFACTS_DIR/semgrep-report/semgrep-report.sarif" >> "$REPORT_MD_FILE"

          echo "" >> "$REPORT_MD_FILE"
          echo "### 📦 govulncheck (Dependency Vulnerabilities)" >> "$REPORT_MD_FILE"

          if [ -f "$ARTIFACTS_DIR/govulncheck-report/govulncheck-report.json" ]; then
            VULN_COUNT=$(jq '[.Vulns[]? // empty] | length' "$ARTIFACTS_DIR/govulncheck-report/govulncheck-report.json" 2>/dev/null || echo 0)
            if [ "$VULN_COUNT" -eq 0 ]; then
              echo "  ✅ No vulnerabilities detected" >> "$REPORT_MD_FILE"
            else
              echo "  Found $VULN_COUNT vulnerabilities:" >> "$REPORT_MD_FILE"
              jq -r '.Vulns[]? | "  - **\(.OSV)** in `\(.PkgPath // \"unknown\")`\n    Range: \(.Affected[0].Range // \"unknown\") | Call: \(.Affected[0].Fixed // \"unfixed\")"' "$ARTIFACTS_DIR/govulncheck-report/govulncheck-report.json" 2>/dev/null | head -20 >> "$REPORT_MD_FILE" || echo "  *(Unable to parse results)*" >> "$REPORT_MD_FILE"
              if [ "$VULN_COUNT" -gt 20 ]; then
                echo "  ... and $((VULN_COUNT - 20)) more (see full report for details)" >> "$REPORT_MD_FILE"
              fi
            fi
          else
            echo "  *(No findings file found - scan may not have completed)*" >> "$REPORT_MD_FILE"
          fi

          echo "" >> "$REPORT_MD_FILE"
          echo "### 🐳 Trivy (Container & Filesystem Scan)" >> "$REPORT_MD_FILE"

          extract_sarif_findings_md "$ARTIFACTS_DIR/trivy-report/trivy-report.sarif" >> "$REPORT_MD_FILE"

          echo "" >> "$REPORT_MD_FILE"
          echo "---" >> "$REPORT_MD_FILE"
          echo "" >> "$REPORT_MD_FILE"
          echo "## Metadata & Links" >> "$REPORT_MD_FILE"
          echo "" >> "$REPORT_MD_FILE"
          echo "**Execution Details**" >> "$REPORT_MD_FILE"
          echo "- Commit: [\`$COMMIT_SHA\`](https://github.com/$GITHUB_REPOSITORY/commit/$GITHUB_SHA)" >> "$REPORT_MD_FILE"
          echo "- Branch: \`$GITHUB_REF_NAME\`" >> "$REPORT_MD_FILE"
          echo "- Actor: @$GITHUB_ACTOR" >> "$REPORT_MD_FILE"
          echo "- Timestamp: $TIMESTAMP" >> "$REPORT_MD_FILE"
          echo "- Workflow Run: [View on GitHub](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)" >> "$REPORT_MD_FILE"
          echo "" >> "$REPORT_MD_FILE"
          echo "**Resources**" >> "$REPORT_MD_FILE"
          echo "- [GitHub Security Code Scanning](https://github.com/$GITHUB_REPOSITORY/security/code-scanning)" >> "$REPORT_MD_FILE"
          echo "- [Action Artifacts](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)" >> "$REPORT_MD_FILE"

          # Generate HTML report
          # Generate simple HTML report
          echo "<html><body><h1>SAST Report</h1><table border=1><tr><th>Tool</th><th>Status</th><th>Findings</th></tr><tr><td>Gitleaks</td><td>$GITLEAKS_EMOJI $GITLEAKS_RESULT</td><td>$GITLEAKS_COUNT</td></tr><tr><td>Semgrep</td><td>$SEMGREP_EMOJI $SEMGREP_RESULT</td><td>$SEMGREP_COUNT</td></tr><tr><td>govulncheck</td><td>$GOVULN_EMOJI $GOVULN_RESULT</td><td>$GOVULN_COUNT</td></tr><tr><td>Trivy</td><td>$TRIVY_EMOJI $TRIVY_RESULT</td><td>$TRIVY_COUNT</td></tr></table></body></html>" > "$REPORT_HTML_FILE"

          extract_sarif_findings_html "$ARTIFACTS_DIR/gitleaks-report/results.sarif" >> "$REPORT_HTML_FILE"

          echo "<h3>Semgrep (Code Analysis)</h3>" >> "$REPORT_HTML_FILE"

          extract_sarif_findings_html "$ARTIFACTS_DIR/semgrep-report/semgrep-report.sarif" >> "$REPORT_HTML_FILE"

          echo "<h3>govulncheck (Dependencies)</h3>" >> "$REPORT_HTML_FILE"

          if [ -f "$ARTIFACTS_DIR/govulncheck-report/govulncheck-report.json" ]; then
            VULN_COUNT=$(jq '[.Vulns[]? // empty] | length' "$ARTIFACTS_DIR/govulncheck-report/govulncheck-report.json" 2>/dev/null || echo 0)
            if [ "$VULN_COUNT" -eq 0 ]; then
              echo "    <p>No vulnerabilities detected</p>" >> "$REPORT_HTML_FILE"
            else
              echo "    <p>Found $VULN_COUNT vulnerabilities:</p><ul>" >> "$REPORT_HTML_FILE"
              jq -r '.Vulns[]? | "<li><strong>\(.OSV)</strong> in \(.PkgPath // \"unknown\")</li>"' "$ARTIFACTS_DIR/govulncheck-report/govulncheck-report.json" 2>/dev/null | head -10 >> "$REPORT_HTML_FILE" || echo "      <li>Unable to parse results</li>" >> "$REPORT_HTML_FILE"
              echo "    </ul>" >> "$REPORT_HTML_FILE"
            fi
          else
            echo "    <p>No findings file found</p>" >> "$REPORT_HTML_FILE"
          fi

          echo "<h3>Trivy (Filesystem)</h3>" >> "$REPORT_HTML_FILE"

          extract_sarif_findings_html "$ARTIFACTS_DIR/trivy-report/trivy-report.sarif" >> "$REPORT_HTML_FILE"

          echo "<h2>Metadata</h2><p>Commit: $COMMIT_SHA<br>Branch: $GITHUB_REF_NAME<br>Actor: $GITHUB_ACTOR<br>Timestamp: $TIMESTAMP</p></body></html>" >> "$REPORT_HTML_FILE"

          # Check if reports were successfully created
          if [ -f "$REPORT_MD_FILE" ] && [ -f "$REPORT_HTML_FILE" ]; then
            echo "✅ Reports generated successfully:"
            echo "   📄 Markdown: $REPORT_MD_FILE"
            echo "   🌐 HTML: $REPORT_HTML_FILE"
          else
            echo "⚠️ Reports generated with partial data:"
            [ -f "$REPORT_MD_FILE" ] && echo "   📄 Markdown: created (may contain N/A entries)"
            [ ! -f "$REPORT_MD_FILE" ] && echo "   📄 Markdown: FAILED"
            [ -f "$REPORT_HTML_FILE" ] && echo "   🌐 HTML: created (may contain N/A entries)"
            [ ! -f "$REPORT_HTML_FILE" ] && echo "   🌐 HTML: FAILED"
          fi

          # Output report path for next steps (even if partially generated)
          echo "report_path=$(pwd)/sast-summary.md" >> "$GITHUB_OUTPUT"

      - name: Upload consolidated report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-summary
          path: |
            sast-summary.md
            sast-summary.html
          retention-days: 90

      - name: Read report for email
        if: always()
        id: email_body
        run: |
          REPORT_CONTENT=$(cat sast-summary.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$REPORT_CONTENT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Compute overall scan status
        id: status
        run: |
          GITLEAKS="${{ needs.gitleaks.result }}"
          SEMGREP="${{ needs.semgrep.result }}"
          GOVULN="${{ needs.govulncheck.result }}"
          TRIVY="${{ needs.trivy.result }}"

          if [[ "$GITLEAKS" == "success" && "$SEMGREP" == "success" \
             && "$GOVULN" == "success" && "$TRIVY" == "success" ]]; then
            echo "overall=PASSED" >> "$GITHUB_OUTPUT"
            echo "emoji=✅" >> "$GITHUB_OUTPUT"
          else
            echo "overall=FAILED" >> "$GITHUB_OUTPUT"
            echo "emoji=⛔" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage reports for publishing
        if: always()
        run: |
          mkdir -p /tmp/publish-reports
          [ -f sast-summary.md ] && cp sast-summary.md /tmp/publish-reports/
          [ -f sast-summary.html ] && cp sast-summary.html /tmp/publish-reports/
          if [ -d /tmp/sast-reports ]; then
            cp -r /tmp/sast-reports/* /tmp/publish-reports/ 2>/dev/null || true
          fi
          ls -la /tmp/publish-reports/

      - name: Publish reports to sast-report repo
        if: always()
        uses: cpina/github-action-push-to-another-repository@main
        env:
          SSH_DEPLOY_KEY: ${{ secrets.REPORT_REPO_DEPLOY_KEY }}
        with:
          source-directory: /tmp/publish-reports
          destination-github-username: pobtampal
          destination-repository-name: sast-report
          target-directory: reports/${{ github.sha }}
          commit-message: >-
            SAST report: ${{ github.ref_name }} @ ${{ github.sha }}
            — Status: ${{ steps.status.outputs.overall }}

      - name: Send email notification with report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.sendgrid.net
          server_port: 465
          username: apikey
          password: ${{ secrets.SENDGRID_API_KEY }}
          to: ${{ secrets.SECURITY_NOTIFY_EMAIL }}
          from: pobtampal@gmail.com
          subject: >-
            ${{ steps.status.outputs.emoji }} SAST ${{
              steps.status.outputs.overall }} — ${{
              github.ref_name }} (${{ github.sha }})
          body: ${{ steps.email_body.outputs.body }}
