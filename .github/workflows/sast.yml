name: SAST Security Scans

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write   # Required to upload SARIF to GitHub Security tab

env:
  GO_VERSION: "1.24"
  REPORT_DIR: /tmp/sast-reports

jobs:
  # ─── Job 1: Secret Scanning (Gitleaks) ───────────────────────────
  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history so Gitleaks can scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}   # Only needed for org-level scanning; omit for public repos

      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: gitleaks

  # ─── Job 2: Static Code Analysis (Semgrep) ───────────────────────
  semgrep:
    name: Code Scan (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create report directory
        run: mkdir -p ${{ env.REPORT_DIR }}

      - name: Run Semgrep — custom rules
        run: |
          semgrep \
            --config=.semgrep.yml \
            --config=p/golang \
            --config=p/owasp-top-ten \
            --severity=ERROR \
            --sarif \
            --output=${{ env.REPORT_DIR }}/semgrep-report.sarif \
            --error \
            .
        continue-on-error: false

      - name: Upload Semgrep SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.REPORT_DIR }}/semgrep-report.sarif
          category: semgrep

      - name: Upload Semgrep report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: ${{ env.REPORT_DIR }}/semgrep-report.sarif
          retention-days: 90

  # ─── Job 3: Dependency Vulnerability Scan (govulncheck) ──────────
  govulncheck:
    name: Dependency Scan (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Create report directory
        run: mkdir -p ${{ env.REPORT_DIR }}

      - name: Run govulncheck
        run: |
          govulncheck -json ./... \
            > ${{ env.REPORT_DIR }}/govulncheck-report.json
          # Also run in human-readable mode for the log
          govulncheck ./...

      - name: Upload govulncheck report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: govulncheck-report
          path: ${{ env.REPORT_DIR }}/govulncheck-report.json
          retention-days: 90

  # ─── Job 4: Container / Filesystem Scan (Trivy) ──────────────────
  trivy:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary (for filesystem scan)
        run: go build -o gcp-security-analyzer .

      - name: Create report directory
        run: mkdir -p ${{ env.REPORT_DIR }}

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: ${{ env.REPORT_DIR }}/trivy-report.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: false

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.REPORT_DIR }}/trivy-report.sarif
          category: trivy

      - name: Upload Trivy report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: ${{ env.REPORT_DIR }}/trivy-report.sarif
          retention-days: 90

  # ─── Job 5: Generate Report & Notify ──────────────────────
  report-and-notify:
    name: Generate Report & Notify
    runs-on: ubuntu-latest
    needs: [gitleaks, semgrep, govulncheck, trivy]
    # Run this job even when scans fail so reports are always generated
    if: always()
    steps:
      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/sast-reports

      - name: Generate consolidated SAST report
        id: report
        env:
          GITLEAKS_RESULT: ${{ needs.gitleaks.result }}
          SEMGREP_RESULT: ${{ needs.semgrep.result }}
          GOVULN_RESULT: ${{ needs.govulncheck.result }}
          TRIVY_RESULT: ${{ needs.trivy.result }}
        run: |
          cat > /tmp/generate-report.sh << 'SCRIPT_EOF'
          #!/bin/bash
          set -euo pipefail

          REPORT_FILE="sast-summary.md"
          ARTIFACTS_DIR="/tmp/sast-reports"
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          COMMIT_SHA="${GITHUB_SHA:0:7}"

          # Start markdown report
          cat > "$REPORT_FILE" << 'REPORT_HEADER'
          # SAST Security Scan Report

          ## Summary Table

          | Tool | Status | Findings |
          |------|--------|----------|
          REPORT_HEADER

          # Helper function to count findings in a SARIF file
          count_sarif_findings() {
            local file="$1"
            if [ ! -f "$file" ]; then
              echo "0"
              return
            fi
            jq '[.runs[].results[] | select(.level != "note")] | length' "$file" 2>/dev/null || echo "0"
          }

          # Helper function to extract and format SARIF findings
          extract_sarif_findings() {
            local file="$1"
            
            if [ ! -f "$file" ]; then
              echo "  *(No findings file found - scan may not have completed)*"
              return
            fi
            
            local count=$(jq '[.runs[].results[] | select(.level != "note")] | length' "$file" 2>/dev/null || echo "0")
            
            if [ "$count" -eq 0 ]; then
              echo "  ✅ No findings detected"
            else
              echo "  Found $count issue(s):"
              jq -r '.runs[].results[] | select(.level != "note") | 
                "  - **\(.ruleId // "unknown")** [\(.level // "info")] — \(.message.text // "No description")" |
                head -10' "$file" 2>/dev/null || echo "  *(Unable to parse results)*"
              if [ "$count" -gt 10 ]; then
                echo "  ... and $((count - 10)) more findings (see full report for details)"
              fi
            fi
          }

          # Process Gitleaks
          if [ -f "$ARTIFACTS_DIR/gitleaks-report/results.sarif" ]; then
            GITLEAKS_COUNT=$(count_sarif_findings "$ARTIFACTS_DIR/gitleaks-report/results.sarif")
            GITLEAKS_EMOJI=$([ "$GITLEAKS_COUNT" -eq 0 ] && echo "✅" || echo "⚠️")
          else
            GITLEAKS_COUNT="N/A"
            GITLEAKS_EMOJI="⚪"
          fi
          echo "| Gitleaks (Secrets) | $GITLEAKS_EMOJI $GITLEAKS_RESULT | $GITLEAKS_COUNT |" >> "$REPORT_FILE"

          # Process Semgrep
          if [ -f "$ARTIFACTS_DIR/semgrep-report/semgrep-report.sarif" ]; then
            SEMGREP_COUNT=$(count_sarif_findings "$ARTIFACTS_DIR/semgrep-report/semgrep-report.sarif")
            SEMGREP_EMOJI=$([ "$SEMGREP_COUNT" -eq 0 ] && echo "✅" || echo "⚠️")
          else
            SEMGREP_COUNT="N/A"
            SEMGREP_EMOJI="⚪"
          fi
          echo "| Semgrep (Code) | $SEMGREP_EMOJI $SEMGREP_RESULT | $SEMGREP_COUNT |" >> "$REPORT_FILE"

          # Process govulncheck
          if [ -f "$ARTIFACTS_DIR/govulncheck-report/govulncheck-report.json" ]; then
            GOVULN_COUNT=$(jq '[.Vulns[]? // empty] | length' "$ARTIFACTS_DIR/govulncheck-report/govulncheck-report.json" 2>/dev/null || echo 0)
            GOVULN_EMOJI=$([ "$GOVULN_COUNT" -eq 0 ] && echo "✅" || echo "⚠️")
          else
            GOVULN_COUNT="N/A"
            GOVULN_EMOJI="⚪"
          fi
          echo "| govulncheck (Deps) | $GOVULN_EMOJI $GOVULN_RESULT | $GOVULN_COUNT |" >> "$REPORT_FILE"

          # Process Trivy
          if [ -f "$ARTIFACTS_DIR/trivy-report/trivy-report.sarif" ]; then
            TRIVY_COUNT=$(count_sarif_findings "$ARTIFACTS_DIR/trivy-report/trivy-report.sarif")
            TRIVY_EMOJI=$([ "$TRIVY_COUNT" -eq 0 ] && echo "✅" || echo "⚠️")
          else
            TRIVY_COUNT="N/A"
            TRIVY_EMOJI="⚪"
          fi
          echo "| Trivy (Filesystem) | $TRIVY_EMOJI $TRIVY_RESULT | $TRIVY_COUNT |" >> "$REPORT_FILE"

          # Add detailed findings sections
          cat >> "$REPORT_FILE" << 'FINDINGS_HEADER'

          ---

          ## Detailed Findings

          ### 🔐 Gitleaks (Secret Scanning)

          FINDINGS_HEADER

          extract_sarif_findings "$ARTIFACTS_DIR/gitleaks-report/results.sarif" >> "$REPORT_FILE"

          cat >> "$REPORT_FILE" << 'FINDINGS_SEMGREP'

          ### 🔍 Semgrep (Static Code Analysis)

          FINDINGS_SEMGREP

          extract_sarif_findings "$ARTIFACTS_DIR/semgrep-report/semgrep-report.sarif" >> "$REPORT_FILE"

          cat >> "$REPORT_FILE" << 'FINDINGS_GOVULN'

          ### 📦 govulncheck (Dependency Vulnerabilities)

          FINDINGS_GOVULN

          if [ -f "$ARTIFACTS_DIR/govulncheck-report/govulncheck-report.json" ]; then
            VULN_COUNT=$(jq '[.Vulns[]? // empty] | length' "$ARTIFACTS_DIR/govulncheck-report/govulncheck-report.json" 2>/dev/null || echo 0)
            if [ "$VULN_COUNT" -eq 0 ]; then
              echo "  ✅ No vulnerabilities detected" >> "$REPORT_FILE"
            else
              echo "  Found $VULN_COUNT vulnerabilities:" >> "$REPORT_FILE"
              jq -r '.Vulns[]? | "  - **\(.OSV)** in `\(.PkgPath // "unknown")`\n    Range: \(.Affected[0].Range // "unknown") | Call: \(.Affected[0].Fixed // "unfixed")"' "$ARTIFACTS_DIR/govulncheck-report/govulncheck-report.json" 2>/dev/null | head -20 >> "$REPORT_FILE" || echo "  *(Unable to parse results)*" >> "$REPORT_FILE"
              if [ "$VULN_COUNT" -gt 20 ]; then
                echo "  ... and $((VULN_COUNT - 20)) more (see full report for details)" >> "$REPORT_FILE"
              fi
            fi
          else
            echo "  *(No findings file found - scan may not have completed)*" >> "$REPORT_FILE"
          fi

          cat >> "$REPORT_FILE" << 'FINDINGS_TRIVY'

          ### 🐳 Trivy (Container & Filesystem Scan)

          FINDINGS_TRIVY

          extract_sarif_findings "$ARTIFACTS_DIR/trivy-report/trivy-report.sarif" >> "$REPORT_FILE"

          # Add metadata footer
          cat >> "$REPORT_FILE" << FOOTER

          ---

          ## Metadata & Links

          **Execution Details**
          - Commit: [\`$COMMIT_SHA\`](https://github.com/$GITHUB_REPOSITORY/commit/$GITHUB_SHA)
          - Branch: \`$GITHUB_REF_NAME\`
          - Actor: @$GITHUB_ACTOR
          - Timestamp: $TIMESTAMP
          - Workflow Run: [View on GitHub](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)

          **Resources**
          - [GitHub Security Code Scanning](https://github.com/$GITHUB_REPOSITORY/security/code-scanning)
          - [Action Artifacts](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)

          FOOTER

          echo "✅ Report generated successfully: $REPORT_FILE"
          SCRIPT_EOF

          chmod +x /tmp/generate-report.sh
          /tmp/generate-report.sh

          # Output report path for next steps
          echo "report_path=$(pwd)/sast-summary.md" >> "$GITHUB_OUTPUT"

      - name: Upload consolidated report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-summary
          path: sast-summary.md
          retention-days: 90

      - name: Read report for email
        if: always()
        id: email_body
        run: |
          REPORT_CONTENT=$(cat sast-summary.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$REPORT_CONTENT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Compute overall scan status
        id: status
        run: |
          GITLEAKS="${{ needs.gitleaks.result }}"
          SEMGREP="${{ needs.semgrep.result }}"
          GOVULN="${{ needs.govulncheck.result }}"
          TRIVY="${{ needs.trivy.result }}"

          if [[ "$GITLEAKS" == "success" && "$SEMGREP" == "success" \
             && "$GOVULN" == "success" && "$TRIVY" == "success" ]]; then
            echo "overall=PASSED" >> "$GITHUB_OUTPUT"
            echo "emoji=✅" >> "$GITHUB_OUTPUT"
          else
            echo "overall=FAILED" >> "$GITHUB_OUTPUT"
            echo "emoji=⛔" >> "$GITHUB_OUTPUT"
          fi

      - name: Send email notification with report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.sendgrid.net
          server_port: 465
          username: apikey
          password: ${{ secrets.SENDGRID_API_KEY }}
          to: ${{ secrets.SECURITY_NOTIFY_EMAIL }}
          from: ci@wanaware.com
          subject: >-
            ${{ steps.status.outputs.emoji }} SAST ${{
              steps.status.outputs.overall }} — ${{
              github.ref_name }} (${{ github.sha }})
          body: ${{ steps.email_body.outputs.body }}
