- Actor: @$GITHUB_ACTOR
- Timestamp: $TIMESTAMP
- Workflow Run: [View on GitHub](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)

**Resources**
- [GitHub Security Code Scanning](https://github.com/$GITHUB_REPOSITORY/security/code-scanning)
- [Action Artifacts](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)

FOOTER_MD

