          echo "✅ Reports generated successfully:"
          echo "   📄 Markdown: $REPORT_MD_FILE"
          echo "   🌐 HTML: $REPORT_HTML_FILE"
          SCRIPT_EOF

          chmod +x /tmp/generate-report.sh
          /tmp/generate-report.sh

          # Output report path for next steps
          echo "report_path=$(pwd)/sast-summary.md" >> "$GITHUB_OUTPUT"

      - name: Upload consolidated report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-summary
          path: |
            sast-summary.md
            sast-summary.html
          retention-days: 90

      - name: Read report for email
        if: always()
        id: email_body
        run: |
          REPORT_CONTENT=$(cat sast-summary.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$REPORT_CONTENT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Compute overall scan status
        id: status
        run: |
          GITLEAKS="${{ needs.gitleaks.result }}"
          SEMGREP="${{ needs.semgrep.result }}"
          GOVULN="${{ needs.govulncheck.result }}"
          TRIVY="${{ needs.trivy.result }}"

          if [[ "$GITLEAKS" == "success" && "$SEMGREP" == "success" \
             && "$GOVULN" == "success" && "$TRIVY" == "success" ]]; then
            echo "overall=PASSED" >> "$GITHUB_OUTPUT"
            echo "emoji=✅" >> "$GITHUB_OUTPUT"
          else
            echo "overall=FAILED" >> "$GITHUB_OUTPUT"
            echo "emoji=⛔" >> "$GITHUB_OUTPUT"
          fi

      - name: Send email notification with report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.sendgrid.net
          server_port: 465
          username: apikey
          password: ${{ secrets.SENDGRID_API_KEY }}
          to: ${{ secrets.SECURITY_NOTIFY_EMAIL }}
          from: ci@wanaware.com
          subject: >-
            ${{ steps.status.outputs.emoji }} SAST ${{
              steps.status.outputs.overall }} — ${{
              github.ref_name }} (${{ github.sha }})
          body: ${{ steps.email_body.outputs.body }}
