name: SAST Security Scans

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write   # Required to upload SARIF to GitHub Security tab

env:
  GO_VERSION: "1.24"
  REPORT_DIR: /tmp/sast-reports

jobs:
  # ─── Job 1: Secret Scanning (Gitleaks) ───────────────────────────
  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history so Gitleaks can scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}   # Only needed for org-level scanning; omit for public repos

      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: gitleaks

  # ─── Job 2: Static Code Analysis (Semgrep) ───────────────────────
  semgrep:
    name: Code Scan (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create report directory
        run: mkdir -p ${{ env.REPORT_DIR }}

      - name: Run Semgrep — custom rules
        run: |
          semgrep \
            --config=.semgrep.yml \
            --config=p/golang \
            --config=p/owasp-top-ten \
            --severity=ERROR \
            --sarif \
            --output=${{ env.REPORT_DIR }}/semgrep-report.sarif \
            --error \
            .
        continue-on-error: false

      - name: Upload Semgrep SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.REPORT_DIR }}/semgrep-report.sarif
          category: semgrep

      - name: Upload Semgrep report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: ${{ env.REPORT_DIR }}/semgrep-report.sarif
          retention-days: 90

  # ─── Job 3: Dependency Vulnerability Scan (govulncheck) ──────────
  govulncheck:
    name: Dependency Scan (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Create report directory
        run: mkdir -p ${{ env.REPORT_DIR }}

      - name: Run govulncheck
        run: |
          govulncheck -json ./... \
            > ${{ env.REPORT_DIR }}/govulncheck-report.json
          # Also run in human-readable mode for the log
          govulncheck ./...

      - name: Upload govulncheck report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: govulncheck-report
          path: ${{ env.REPORT_DIR }}/govulncheck-report.json
          retention-days: 90

  # ─── Job 4: Container / Filesystem Scan (Trivy) ──────────────────
  trivy:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary (for filesystem scan)
        run: go build -o gcp-security-analyzer .

      - name: Create report directory
        run: mkdir -p ${{ env.REPORT_DIR }}

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: ${{ env.REPORT_DIR }}/trivy-report.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: false

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.REPORT_DIR }}/trivy-report.sarif
          category: trivy

      - name: Upload Trivy report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: ${{ env.REPORT_DIR }}/trivy-report.sarif
          retention-days: 90

  # ─── Job 5: Generate Report & Notify ──────────────────────
  report-and-notify:
    name: Generate Report & Notify
    runs-on: ubuntu-latest
    needs: [gitleaks, semgrep, govulncheck, trivy]
    # Run this job even when scans fail so reports are always generated
    if: always()
    steps:
      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/sast-reports

      - name: Generate consolidated SAST report
        id: report
        env:
          GITLEAKS_RESULT: ${{ needs.gitleaks.result }}
          SEMGREP_RESULT: ${{ needs.semgrep.result }}
          GOVULN_RESULT: ${{ needs.govulncheck.result }}
          TRIVY_RESULT: ${{ needs.trivy.result }}
        run: |
          cat > /tmp/generate-report.sh << 'SCRIPT_EOF'
          #!/bin/bash
          set -euo pipefail

          REPORT_MD_FILE="sast-summary.md"
          REPORT_HTML_FILE="sast-summary.html"
          ARTIFACTS_DIR="/tmp/sast-reports"
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          COMMIT_SHA="${GITHUB_SHA:0:7}"

          # Helper function to count findings in a SARIF file
          count_sarif_findings() {
            local file="$1"
            if [ ! -f "$file" ]; then
              echo "0"
              return
            fi
            jq '[.runs[].results[] | select(.level != "note")] | length' "$file" 2>/dev/null || echo "0"
          }

          # Helper function to extract and format SARIF findings for Markdown
          extract_sarif_findings_md() {
            local file="$1"
            
            if [ ! -f "$file" ]; then
              echo "  *(No findings file found - scan may not have completed)*"
              return
            fi
            
            local count=$(jq '[.runs[].results[] | select(.level != "note")] | length' "$file" 2>/dev/null || echo "0")
            
            if [ "$count" -eq 0 ]; then
              echo "  ✅ No findings detected"
            else
              echo "  Found $count issue(s):"
              jq -r '.runs[].results[] | select(.level != "note") | 
                "  - **\(.ruleId // "unknown")** [\(.level // "info")] — \(.message.text // "No description")" |
                head -10' "$file" 2>/dev/null || echo "  *(Unable to parse results)*"
              if [ "$count" -gt 10 ]; then
                echo "  ... and $((count - 10)) more findings (see full report for details)"
              fi
            fi
          }

          # Helper function to extract and format SARIF findings for HTML
          extract_sarif_findings_html() {
            local file="$1"
            
            if [ ! -f "$file" ]; then
              echo "    <p><em>No findings file found - scan may not have completed</em></p>"
              return
            fi
            
            local count=$(jq '[.runs[].results[] | select(.level != "note")] | length' "$file" 2>/dev/null || echo "0")
            
            if [ "$count" -eq 0 ]; then
              echo "    <p>✅ No findings detected</p>"
            else
              echo "    <p>Found $count issue(s):</p>"
              echo "    <ul>"
              jq -r '.runs[].results[] | select(.level != "note") | 
                "<li><strong>\(.ruleId // "unknown")</strong> [\(.level // "info")] — \(.message.text // "No description")</li>" |
                head -10' "$file" 2>/dev/null || echo "      <li><em>Unable to parse results</em></li>"
              if [ "$count" -gt 10 ]; then
                echo "      <li>... and $((count - 10)) more findings (see full report for details)</li>"
              fi
              echo "    </ul>"
            fi
          }

          # Process scan results
          if [ -f "$ARTIFACTS_DIR/gitleaks-report/results.sarif" ]; then
            GITLEAKS_COUNT=$(count_sarif_findings "$ARTIFACTS_DIR/gitleaks-report/results.sarif")
            GITLEAKS_EMOJI=$([ "$GITLEAKS_COUNT" -eq 0 ] && echo "✅" || echo "⚠️")
          else
            GITLEAKS_COUNT="N/A"
            GITLEAKS_EMOJI="⚪"
          fi

          if [ -f "$ARTIFACTS_DIR/semgrep-report/semgrep-report.sarif" ]; then
            SEMGREP_COUNT=$(count_sarif_findings "$ARTIFACTS_DIR/semgrep-report/semgrep-report.sarif")
            SEMGREP_EMOJI=$([ "$SEMGREP_COUNT" -eq 0 ] && echo "✅" || echo "⚠️")
          else
            SEMGREP_COUNT="N/A"
            SEMGREP_EMOJI="⚪"
          fi

          if [ -f "$ARTIFACTS_DIR/govulncheck-report/govulncheck-report.json" ]; then
            GOVULN_COUNT=$(jq '[.Vulns[]? // empty] | length' "$ARTIFACTS_DIR/govulncheck-report/govulncheck-report.json" 2>/dev/null || echo 0)
            GOVULN_EMOJI=$([ "$GOVULN_COUNT" -eq 0 ] && echo "✅" || echo "⚠️")
          else
            GOVULN_COUNT="N/A"
            GOVULN_EMOJI="⚪"
          fi

          if [ -f "$ARTIFACTS_DIR/trivy-report/trivy-report.sarif" ]; then
            TRIVY_COUNT=$(count_sarif_findings "$ARTIFACTS_DIR/trivy-report/trivy-report.sarif")
            TRIVY_EMOJI=$([ "$TRIVY_COUNT" -eq 0 ] && echo "✅" || echo "⚠️")
          else
            TRIVY_COUNT="N/A"
            TRIVY_EMOJI="⚪"
          fi

          # Generate Markdown report
          cat > "$REPORT_MD_FILE" << REPORT_HEADER
# SAST Security Scan Report

## Summary Table

| Tool | Status | Findings |
|------|--------|----------|
| Gitleaks (Secrets) | $GITLEAKS_EMOJI $GITLEAKS_RESULT | $GITLEAKS_COUNT |
| Semgrep (Code) | $SEMGREP_EMOJI $SEMGREP_RESULT | $SEMGREP_COUNT |
| govulncheck (Deps) | $GOVULN_EMOJI $GOVULN_RESULT | $GOVULN_COUNT |
| Trivy (Filesystem) | $TRIVY_EMOJI $TRIVY_RESULT | $TRIVY_COUNT |

---

## Detailed Findings

### 🔐 Gitleaks (Secret Scanning)

REPORT_HEADER

          extract_sarif_findings_md "$ARTIFACTS_DIR/gitleaks-report/results.sarif" >> "$REPORT_MD_FILE"

          cat >> "$REPORT_MD_FILE" << 'FINDINGS_SEMGREP'

### 🔍 Semgrep (Static Code Analysis)

FINDINGS_SEMGREP

          extract_sarif_findings_md "$ARTIFACTS_DIR/semgrep-report/semgrep-report.sarif" >> "$REPORT_MD_FILE"

          cat >> "$REPORT_MD_FILE" << 'FINDINGS_GOVULN'

### 📦 govulncheck (Dependency Vulnerabilities)

FINDINGS_GOVULN

          if [ -f "$ARTIFACTS_DIR/govulncheck-report/govulncheck-report.json" ]; then
            VULN_COUNT=$(jq '[.Vulns[]? // empty] | length' "$ARTIFACTS_DIR/govulncheck-report/govulncheck-report.json" 2>/dev/null || echo 0)
            if [ "$VULN_COUNT" -eq 0 ]; then
              echo "  ✅ No vulnerabilities detected" >> "$REPORT_MD_FILE"
            else
              echo "  Found $VULN_COUNT vulnerabilities:" >> "$REPORT_MD_FILE"
              jq -r '.Vulns[]? | "  - **\(.OSV)** in `\(.PkgPath // "unknown")`\n    Range: \(.Affected[0].Range // "unknown") | Call: \(.Affected[0].Fixed // "unfixed")"' "$ARTIFACTS_DIR/govulncheck-report/govulncheck-report.json" 2>/dev/null | head -20 >> "$REPORT_MD_FILE" || echo "  *(Unable to parse results)*" >> "$REPORT_MD_FILE"
              if [ "$VULN_COUNT" -gt 20 ]; then
                echo "  ... and $((VULN_COUNT - 20)) more (see full report for details)" >> "$REPORT_MD_FILE"
              fi
            fi
          else
            echo "  *(No findings file found - scan may not have completed)*" >> "$REPORT_MD_FILE"
          fi

          cat >> "$REPORT_MD_FILE" << 'FINDINGS_TRIVY'

### 🐳 Trivy (Container & Filesystem Scan)

FINDINGS_TRIVY

          extract_sarif_findings_md "$ARTIFACTS_DIR/trivy-report/trivy-report.sarif" >> "$REPORT_MD_FILE"

          cat >> "$REPORT_MD_FILE" << FOOTER_MD

---

## Metadata & Links

**Execution Details**
- Commit: [\`$COMMIT_SHA\`](https://github.com/$GITHUB_REPOSITORY/commit/$GITHUB_SHA)
