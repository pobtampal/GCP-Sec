name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.21", "1.22", "1.23"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Lint (go vet)
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v -race -coverprofile=coverage.out -covermode=atomic

      - name: Check coverage
        run: |
          go tool cover -func=coverage.out | grep total
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"

      - name: Build binary
        run: go build -o GCP-Sec .

      - name: Run sample analysis (smoke test)
        run: |
          ./GCP-Sec analyze testdata/sample-findings.csv \
            --output /tmp/test-report.md \
            --include-remediation \
            --include-compliance
          echo "Smoke test passed - report generated"
          wc -l /tmp/test-report.md

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: matrix.go-version == '1.23'
        with:
          name: coverage-report
          path: coverage.out

  release:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build for multiple platforms
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-ldflags=-X main.version=${VERSION} -s -w"

          GOOS=linux   GOARCH=amd64 go build ${LDFLAGS} -o dist/GCP-Sec-linux-amd64 .
          GOOS=linux   GOARCH=arm64 go build ${LDFLAGS} -o dist/GCP-Sec-linux-arm64 .
          GOOS=darwin  GOARCH=amd64 go build ${LDFLAGS} -o dist/GCP-Sec-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64 go build ${LDFLAGS} -o dist/GCP-Sec-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build ${LDFLAGS} -o dist/GCP-Sec-windows-amd64.exe .

      - name: Upload release binaries
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: dist/
